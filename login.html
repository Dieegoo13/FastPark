<body>

<div class="login-card">

  <!-- LOGO -->
  <div class="logo-wrap">

         alt="FastPark"
         onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='flex';">
    <div class="logo-icon-fallback" id="logo-fallback" style="display:none;">FP</div>
    <span class="logo-text">FastPark</span>
  </div>

  <h1 class="login-title">PAINEL ADMIN</h1>

  <!-- ERRO (exibido pelo PHP se login falhar) -->
  <?php if (!empty($erro)): ?>
  <div class="error-msg show mb-3">
    <i class="bi bi-exclamation-circle me-1"></i> <?= htmlspecialchars($erro) ?>
  </div>
  <?php endif; ?>

  <form class="form-wrap" action="/login" method="POST">

    <div class="field-group">
      <label for="email">Email</label>
      <div class="input-wrap">
        <i class="bi bi-envelope"></i>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="seu@email.com"
          value="<?= htmlspecialchars($_POST['email'] ?? '') ?>"
          required
          autocomplete="email"
        />
      </div>
    </div>

    <div class="field-group">
      <label for="senha">Senha</label>
      <div class="input-wrap">
        <i class="bi bi-lock"></i>
        <input
          type="password"
          id="senha"
          name="senha"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
        <button type="button" class="toggle-pw" onclick="toggleSenha()" tabindex="-1">
          <i class="bi bi-eye" id="eyeIcon"></i>
        </button>
      </div>
    </div>

    <button type="submit" class="btn-entrar">ENTRAR</button>

  </form>
</div>

<script>
  function toggleSenha() {
    const input = document.getElementById('senha');
    const icon  = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.className = 'bi bi-eye-slash';
    } else {
      input.type = 'password';
      icon.className = 'bi bi-eye';
    }
  }
</script>

</body>
